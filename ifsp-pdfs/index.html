<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFSP PDFs - Repositório de Documentos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <i class="fas fa-file-pdf"></i>
            <h1>IFSP PDFs</h1>
        </div>
        <p class="subtitle">Repositório de Documentos Acadêmicos</p>
    </header>

    <main>
        <section class="upload-section">
            <div class="upload-container">
                <h2><i class="fas fa-cloud-upload-alt"></i> Upload de PDF</h2>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="file-input-wrapper">
                        <input type="file" id="pdfFile" accept=".pdf" required>
                        <label for="pdfFile" class="file-label">
                            <i class="fas fa-folder-open"></i>
                            <span>Escolher arquivo PDF</span>
                        </label>
                        <p id="fileName" class="file-name">Nenhum arquivo selecionado</p>
                    </div>
                    <button type="submit" class="upload-btn">
                        <i class="fas fa-upload"></i> Enviar PDF
                    </button>
                </form>
                <div id="uploadStatus" class="status-message"></div>
            </div>
        </section>

        <section class="pdfs-section">
            <div class="pdfs-header">
                <h2><i class="fas fa-folder"></i> Documentos Disponíveis</h2>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Buscar PDFs...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
            
            <div id="pdfsList" class="pdfs-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando documentos...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 IFSP PDFs - Instituto Federal de São Paulo</p>
        <div class="footer-links">
            <a href="#"><i class="fas fa-info-circle"></i> Sobre</a>
            <a href="#"><i class="fas fa-envelope"></i> Contato</a>
            <a href="#"><i class="fas fa-shield-alt"></i> Privacidade</a>
        </div>
    </footer>

    <div id="notification" class="notification"></div>
    
    <script src="script.js"></script>
</body>
</html>
